[build]
  command = "npm --prefix backend ci && npm --prefix frontend ci && npm --prefix frontend run build"
  publish = "frontend/dist"

[functions]
  directory = "backend/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
