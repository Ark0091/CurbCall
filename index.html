<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurbCall - Paris Smart Parking</title>
    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; overflow: hidden; }
        header { background-color: #0047AB; color: white; padding: 1rem; text-align: center; font-size: 1.2rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: relative; z-index: 2000; }
        #map { height: 65vh; width: 100%; }
        .panel { height: 35vh; padding: 1.5rem; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; margin-top: -20px; position: relative; z-index: 1000; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #333; }
        p { color: #666; font-size: 0.95rem; line-height: 1.4; }
        .btn { display: block; width: 100%; background-color: #0047AB; color: white; border: none; padding: 1rem; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-align: center; margin-top: 1rem; transition: opacity 0.2s; }
        .btn:active { background-color: #003380; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { display: none; margin-top: 1rem; padding: 1rem; background-color: #e8f5e9; color: #2e7d32; border-radius: 8px; text-align: center; font-weight: bold; border: 2px solid #4caf50; }
    </style>
</head>
<body>
    <header>CurbCall</header>
    <div id="map"></div>
    <div class="panel">
        <h2>Available Curb Zones</h2>
        <div id="zone-info">
            <p>Tap a green zone on the map to view details and request access.</p>
        </div>
        <button class="btn" id="request-btn" disabled style="opacity: 0.5;">Select a zone to request access</button>
        <div id="status">Session Active: 15:00 remaining</div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([48.8566, 2.3522], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap contributors' }).addTo(map);

        const zones = [
            { id: 1, lat: 48.8580, lng: 2.3510, status: 'available', name: 'Rue de Rivoli - Delivery', type: 'Delivery' },
            { id: 2, lat: 48.8550, lng: 2.3540, status: 'occupied', name: 'Le Marais - Taxi Only', type: 'Taxi' },
            { id: 3, lat: 48.8595, lng: 2.3535, status: 'available', name: 'Châtelet - Trades/Medical', type: 'Trades' }
        ];

        const requestBtn = document.getElementById('request-btn');
        const zoneInfo = document.getElementById('zone-info');
        const statusDiv = document.getElementById('status');
        let timerInterval;

        zones.forEach(zone => {
            const color = zone.status === 'available' ? '#4caf50' : '#f44336';
            const circle = L.circleMarker([zone.lat, zone.lng], { color: color, fillColor: color, fillOpacity: 0.8, radius: 12, weight: 2 }).addTo(map);

            circle.on('click', () => {
                zoneInfo.innerHTML = `
                    <p style="margin: 0;"><strong>📍 ${zone.name}</strong></p>
                    <p style="margin: 5px 0 0 0;">Allowed: ${zone.type} • Status: <span style="color:${color}; font-weight:bold;">${zone.status.toUpperCase()}</span></p>
                `;
                if (zone.status === 'available') {
                    requestBtn.disabled = false; requestBtn.style.opacity = '1'; requestBtn.innerText = "Request 15 Min Access";
                } else {
                    requestBtn.disabled = true; requestBtn.style.opacity = '0.5'; requestBtn.innerText = "Zone Occupied";
                }
            });
        });

        requestBtn.addEventListener('click', () => {
            requestBtn.style.display = 'none'; zoneInfo.style.display = 'none'; statusDiv.style.display = 'block';
            let timeLeft = 15 * 60;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60); const secs = timeLeft % 60;
                statusDiv.innerText = `✅ Session Active\n${mins}:${secs.toString().padStart(2, '0')} remaining`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval); statusDiv.innerText = "Session Expired"; statusDiv.style.backgroundColor = "#ffebee"; statusDiv.style.color = "#c62828"; statusDiv.style.borderColor = "#c62828";
                }
            }, 1000);
        });
    </script>
</body>
</html>
